name: shinobilson

services:
  bot:
    container_name: shinobilson-bot
    image: ghcr.io/h4rdrew/shinobilson-bot:${BOT_VERSION:?Defina BOT_VERSION em .deploy.env}
    pull_policy: always
    env_file:
      - .env
    environment:
      NODE_ENV: production
      TZ: America/Sao_Paulo
    volumes:
      - type: bind
        source: ./logs
        target: /app/logs
      - type: bind
        source: ./secrets
        target: /app/secrets
        read_only: true
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    stop_grace_period: 15s
